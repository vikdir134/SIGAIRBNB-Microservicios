apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-service
  namespace: staype
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finance-service
  template:
    metadata:
      labels:
        app: finance-service
    spec:
      containers:
        - name: finance-service
          image: staype-microservices-finance-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          envFrom:
            - secretRef:
                name: finance-env
          env:
            - name: PORT
              value: "8084"

            - name: REGISTRY_SERVER_URL
              value: "http://registry-service:8761"

            - name: FINANCE_PG_HOST
              value: "finance-postgres"

            - name: FINANCE_PG_PORT
              value: "5432"

            - name: FINANCE_PG_USER
              value: "finance_user"

            - name: FINANCE_PG_PASSWORD
              value: "finance_pass"

            - name: FINANCE_PG_DATABASE
              value: "staype_finance_db"

            - name: CATALOG_SERVICE_URL
              value: "http://catalog-service:8082"

            - name: BOOKING_SERVICE_URL
              value: "http://booking-service:8083"

            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8081"

            - name: GATEWAY_SECRET
              value: "staype-secret"
---
apiVersion: v1
kind: Service
metadata:
  name: finance-service
  namespace: staype
spec:
  selector:
    app: finance-service
  ports:
    - port: 8084
      targetPort: 8084