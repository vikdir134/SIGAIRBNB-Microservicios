apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: staype
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: staype-microservices-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - secretRef:
                name: auth-env
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: staype
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
