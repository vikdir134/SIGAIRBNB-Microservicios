apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: staype
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: sigairbnb-microservicios-booking-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - secretRef:
                name: booking-env
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: staype
spec:
  selector:
    app: booking-service
  ports:
    - port: 8083
      targetPort: 8083
