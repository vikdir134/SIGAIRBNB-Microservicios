services:
  # Config Service
  # Equivalente al Config Server de Spring Cloud.
  config-service:
    build: ./config-service
    container_name: staype-config-service
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo
    environment:
      - PORT=8888
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Registry Service
  # Equivalente conceptual a Eureka Server.
  registry-service:
    build: ./registry-service
    container_name: staype-registry-service
    ports:
      - "8761:8761"
    environment:
      - PORT=8761
    depends_on:
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL para booking-service
  booking-mysql:
    image: mysql:8.0
    container_name: staype-booking-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: staype_booking_db
      MYSQL_USER: booking_user
      MYSQL_PASSWORD: booking_pass
    ports:
      - "3307:3306"
    volumes:
      - booking_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Catalog Service
  # Maneja edificios, inmuebles, publicaciones y disponibilidad.
  catalog-service:
    build: ./catalog-service
    container_name: staype-catalog-service
    expose:
      - "8082"
    env_file:
      - ./catalog-service/.env
    depends_on:
      registry-service:
        condition: service_healthy

  # Auth Service
  auth-service:
    build: ./auth-service
    container_name: staype-auth-service
    expose:
      - "8081"
    env_file:
      - ./auth-service/.env
    depends_on:
      registry-service:
        condition: service_healthy

  # Booking Service
  booking-service:
    build: ./booking-service
    container_name: staype-booking-service
    expose:
      - "8083"
    env_file:
      - ./booking-service/.env
    depends_on:
      registry-service:
        condition: service_healthy
      booking-mysql:
        condition: service_healthy

  # Finance Service
  finance-service:
    build: ./finance-service
    container_name: staype-finance-service
    expose:
      - "8084"
    env_file:
      - ./finance-service/.env
    depends_on:
      registry-service:
        condition: service_healthy

  # API Gateway
  # Unica entrada publica hacia los microservicios.
  api-gateway:
    build: ./api-gateway
    container_name: staype-api-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - CONFIG_SERVER_URL=http://config-service:8888
      - REGISTRY_SERVER_URL=http://registry-service:8761
      - GATEWAY_SECRET=staype-secret
    depends_on:
      config-service:
        condition: service_healthy
      registry-service:
        condition: service_healthy
      catalog-service:
        condition: service_started
      auth-service:
        condition: service_started
      booking-service:
        condition: service_started
      finance-service:
        condition: service_started

volumes:
  booking_mysql_data: